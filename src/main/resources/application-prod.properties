# Server - Render asigna puerto dinï¿½micamente vï¿½a $PORT
server.port=${PORT:8083}

# Database - Supabase (URL inyectada como variable de entorno)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate - producciï¿½n (NO modificar esquema automï¿½ticamente)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool - optimizado para producciï¿½n
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Logging - solo errores en producciï¿½n
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.codefactory.reservasmsscheduleservice=INFO

# Transaction
spring.transaction.default-timeout=30
spring.transaction.rollback-on-commit-failure=true

# Actuator - solo health bï¿½sico en producciï¿½n
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Security headers adicionales
server.forward-headers-strategy=framework
